<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A0A04">
<title>Geoparque Pun Antü · Cerro El Triunfo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#0E0402;}
body{font-family:'Nunito',sans-serif;color:#FDF8EE;}

/* ── CSS vars — written as literals to avoid iOS autocorrect breaking -- ── */

/* ════════════════════════════
   MAIN SCREEN
════════════════════════════ */
#main{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:radial-gradient(circle at 50% 30%,#5A2008 0%,#0E0402 100%);
  overflow:hidden;
}

/* Top bar */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;
  background:linear-gradient(to bottom,rgba(14,4,2,.95) 60%,transparent);
  flex-shrink:0;
}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-area img{width:40px;height:40px;object-fit:contain;}
.logo-txt .l1{font-size:9px;letter-spacing:3px;color:#C8841E;text-transform:uppercase;font-weight:800;}
.logo-txt .l2{font-family:'Playfair Display',serif;font-size:18px;color:#FDF8EE;line-height:1;}
.logo-txt .l3{font-size:8px;letter-spacing:2px;color:#9B8A6E;text-transform:uppercase;}
.ar-photo-btn{
  background:#C8841E;color:#FDF8EE;border:none;
  border-radius:20px;padding:9px 14px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  letter-spacing:.3px;white-space:nowrap;
  box-shadow:0 2px 12px rgba(200,132,30,.4);
}
.ar-photo-btn:active{background:#A86A10;transform:scale(.97);}

/* Site tag */
.site-tag{
  display:flex;align-items:center;gap:8px;
  padding:0 18px 10px;flex-shrink:0;
}
.site-num{background:#7A1A0A;color:#fff;font-size:9px;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.site-name{font-family:'Playfair Display',serif;font-size:14px;color:rgba(255,255,255,.8);}

/* 3D model area */
/* mv-main is now position:absolute inside its wrapper */

/* Bottom pills */
.bottom-bar{
  flex-shrink:0;
  padding:10px 16px max(28px,env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(14,4,2,.98) 55%,rgba(14,4,2,.6) 80%,transparent);
}
.bar-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:#9B8A6E;font-weight:700;margin-bottom:8px;text-align:center;
}
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{
  flex-shrink:0;
  background:rgba(200,132,30,.15);
  border:1.5px solid rgba(200,132,30,.3);
  border-radius:22px;padding:11px 18px;
  color:#FDF8EE;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:all .18s;white-space:nowrap;
}
.pill:active,.pill.active{
  background:rgba(200,132,30,.55);
  border-color:#C8841E;
}
.pill .pi{font-size:18px;}

/* ════════════════════════════
   INFO PANEL (slides up)
════════════════════════════ */
#info-panel{
  position:fixed;inset:0;top:auto;
  width:100%;z-index:300;
  background:rgba(18,6,2,.95);
  border-radius:22px 22px 0 0;
  padding:0 0 44px;
  max-height:78vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(.3,1,.3,1);
}
#info-panel.open{transform:translateY(0);}
.panel-handle{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:12px auto 0;}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;
  border-bottom:1px solid rgba(255,255,255,.07);
  position:sticky;top:0;background:rgba(18,6,2,.98);z-index:1;
}
.panel-head h2{font-family:'Playfair Display',serif;font-size:20px;color:#FDF8EE;}
.panel-close{
  background:rgba(255,255,255,.1);border:none;color:#FDF8EE;
  width:32px;height:32px;border-radius:50%;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.panel-body{padding:16px 18px 8px;}

/* Content cards */
.xcard{
  border-left:3px solid #C8841E;
  border-radius:0 10px 10px 0;
  background:rgba(255,255,255,.05);
  padding:12px 14px;margin-bottom:12px;
  color:rgba(255,255,255,.85);font-size:13px;line-height:1.7;
}
.xcard h4{
  font-size:9px;text-transform:uppercase;letter-spacing:1.5px;
  color:#C8841E;font-weight:800;margin-bottom:7px;
}
.xhi{
  background:rgba(200,132,30,.12);
  border:1px solid rgba(200,132,30,.28);
  border-radius:12px;padding:14px;margin-bottom:12px;
  color:rgba(255,255,255,.88);font-size:13px;line-height:1.6;
}
.xhi .xi{font-size:24px;margin-bottom:6px;}
.xhi strong{color:#F0C070;}
.bnum{font-family:'Playfair Display',serif;font-size:46px;color:#C8841E;line-height:1;}
.tli{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;}
.tld{width:9px;height:9px;border-radius:50%;background:#C8841E;flex-shrink:0;margin-top:5px;}
.tld.o{background:#9B8A6E;}
.tli strong{display:block;font-size:13px;color:#FDF8EE;font-weight:700;}
.tli span{font-size:12px;color:#9B8A6E;}

/* Decay slider */
.decay-bar-wrap{
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
}
.decay-bar{
  flex:1;height:22px;border-radius:11px;
  overflow:hidden;background:rgba(255,255,255,.08);position:relative;
}
.decay-u{
  position:absolute;left:0;top:0;height:100%;
  background:linear-gradient(90deg,#F0C070,#C8841E);
  border-radius:11px;transition:width .08s;width:100%;
}
.decay-pb{
  position:absolute;right:0;top:0;height:100%;
  background:linear-gradient(90deg,#7A90A8,#B0B8C8);
  border-radius:11px;transition:width .08s;width:0%;
}
.decay-labels{display:flex;justify-content:space-between;font-size:11px;margin-bottom:16px;}
.decay-result{
  background:rgba(200,132,30,.15);border:1px solid rgba(200,132,30,.3);
  border-radius:10px;padding:14px;text-align:center;margin-bottom:16px;
}
.decay-result-label{font-size:11px;color:#9B8A6E;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
.decay-result-age{font-family:'Playfair Display',serif;font-size:36px;color:#C8841E;line-height:1;}
.decay-result-unit{font-size:11px;color:#9B8A6E;margin-top:2px;}
.decay-result-event{font-size:12px;color:rgba(255,255,255,.75);margin-top:8px;min-height:18px;font-weight:600;}
.decay-slider{
  width:100%;height:8px;border-radius:4px;
  background:rgba(255,255,255,.15);outline:none;cursor:pointer;
  margin-bottom:6px;
  -webkit-appearance:none;appearance:none;
}
.decay-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:26px;height:26px;border-radius:50%;
  background:#C8841E;cursor:pointer;
  box-shadow:0 2px 8px rgba(200,132,30,.5);
}
.decay-slider::-moz-range-thumb{
  width:26px;height:26px;border-radius:50%;
  background:#C8841E;cursor:pointer;border:none;
}
.decay-scale{display:flex;justify-content:space-between;font-size:10px;color:#9B8A6E;}

/* Quiz */
.qq{
  background:rgba(122,26,10,.28);border:1px solid rgba(122,26,10,.45);
  border-radius:12px;padding:16px;margin-bottom:14px;
  font-family:'Playfair Display',serif;font-size:17px;
  color:#FDF8EE;line-height:1.4;
}
.qq .ql{
  font-family:'Nunito',sans-serif;font-size:9px;letter-spacing:1px;
  text-transform:uppercase;color:#C8841E;display:block;margin-bottom:6px;font-weight:700;
}
.qo{
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);
  border-radius:9px;padding:12px 14px;margin-bottom:8px;
  cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;
  font-weight:600;width:100%;text-align:left;color:#FDF8EE;transition:all .15s;
}
.qo.ok{background:rgba(78,138,42,.22);border-color:#4E8A2A;color:#90D060;}
.qo.no{background:rgba(196,58,58,.18);border-color:#C43A3A;color:#F08080;}
.qfb{
  display:none;border-radius:9px;padding:11px 14px;
  margin-top:3px;font-size:12.5px;line-height:1.6;
}
.qfb.ok{background:rgba(78,138,42,.12);color:#90D060;display:block;}
.qfb.no{background:rgba(196,58,58,.12);color:#F08080;display:block;}

/* ════════════════════════════
   AR PHOTO SCREEN
════════════════════════════ */
#ar-screen{
  position:fixed;inset:0;z-index:400;
  display:none;background:#000;
}
#ar-screen.open{display:block;}

#cam-video{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;z-index:0;
}
#ar-model{
  position:absolute;inset:0;z-index:5;
  width:100%;height:100%;
  background:transparent;
  --poster-color:transparent;
  /* model sits in bottom half */
  top:30%;
}
/* photo booth — no camera needed */
</style>
</head>

/* ════════════
   LOGO — remove black bg via canvas
════════════ */
function removeBlackBg(img){
  if(!img.complete||img.naturalWidth===0){
    img.onload=()=>removeBlackBg(img);return;
  }
  try{
    const c=document.createElement('canvas');
    c.width=img.naturalWidth;c.height=img.naturalHeight;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height);
    for(let i=0;i<d.data.length;i+=4){
      if(d.data[i]<50&&d.data[i+1]<50&&d.data[i+2]<50) d.data[i+3]=0;
    }
    ctx.putImageData(d,0,0);
    img.src=c.toDataURL('image/png');
  }catch(e){}
}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('img[src="logo.png"]').forEach(removeBlackBg);
});

/* ════════════
   DECAY WIDGET
════════════ */
function initDecay(){
  const slider=document.getElementById('decay-slider');
  if(!slider)return;
  const events=[
    {ma:0,    txt:'⬅️ Deslizá para retroceder en el tiempo'},
    {ma:66,   txt:'🦕 Los dinosaurios se extinguieron'},
    {ma:252,  txt:'💀 La mayor extinción masiva de la historia'},
    {ma:541,  txt:'🐚 Aparecen los primeros animales con esqueleto'},
    {ma:1000, txt:'🌍 Los continentes forman un supercontinente'},
    {ma:2200, txt:'🪨 ¡Aquí se formaron las rocas del Cerro El Triunfo!'},
    {ma:3800, txt:'🦠 Aparece la primera vida en la Tierra'},
    {ma:4600, txt:'💫 La Tierra recién se está formando'},
  ];
  function update(){
    const ma=parseInt(slider.value);
    const uFrac=Math.pow(0.5,ma/4468);
    const uP=Math.round(uFrac*100);
    const pbP=100-uP;
    document.getElementById('decay-u').style.width=uP+'%';
    document.getElementById('decay-pb').style.width=pbP+'%';
    document.getElementById('decay-u-pct').textContent=uP;
    document.getElementById('decay-pb-pct').textContent=pbP;
    document.getElementById('decay-age').textContent=ma.toLocaleString('es-AR');
    let best=events[0],dist=Infinity;
    events.forEach(e=>{const d=Math.abs(e.ma-ma);if(d<dist){dist=d;best=e;}});
    document.getElementById('decay-event').textContent=dist<150?best.txt:'';
  }
  slider.addEventListener('input',update);
  update();
}

const QS=[
  {q:'¿A qué tipo de roca pertenece el Gneis?',
   opts:['🔥 Roca ígnea','💎 Roca metamórfica','🏖️ Roca sedimentaria'],ok:1,
   fb:{ok:'¡Exacto! El Gneis es metamórfico. ✅',no:'No. El Gneis es <strong>metamórfico</strong>. ❌'}},
  {q:'¿A cuánta profundidad se formaron?',
   opts:['📏 2 km','📏 10 km','📏 +20 km'],ok:2,
   fb:{ok:'¡Correcto! Más de 20 km. ✅',no:'No. Se formaron a <strong>más de 20 km</strong>. ❌'}},
  {q:'¿Cuántos millones de años tienen?',
   opts:['🕰️ 200 Ma','🕰️ 600 Ma','🕰️ 2.200 Ma'],ok:2,
   fb:{ok:'¡Así es! 2.200 millones de años. ✅',no:'No. Tienen <strong>2.200 millones de años</strong>. ❌'}}
];
let qScore=0,qIdx=0,qAns=[false,false,false];

function initQuiz(){qScore=0;qIdx=0;qAns=[false,false,false];renderQ();}
function renderQ(){
  const w=document.getElementById('qwrap');if(!w)return;
  if(qIdx>=QS.length){showQRes();return;}
  const q=QS[qIdx];
  w.innerHTML=`<div class="qq"><span class="ql">Pregunta ${qIdx+1} de ${QS.length}</span>${q.q}</div>
    ${q.opts.map((o,i)=>`<button class="qo" onclick="ansQ(this,${i===q.ok},${qIdx})">${o}</button>`).join('')}
    <div id="qfb" class="qfb"></div>`;
}
function ansQ(el,ok,n){
  if(qAns[n])return;qAns[n]=true;if(ok)qScore++;
  document.querySelectorAll('.qo').forEach(b=>b.disabled=true);
  el.classList.add(ok?'ok':'no');
  const fb=document.getElementById('qfb');
  fb.innerHTML=(ok?'🎉 ':'🤔 ')+QS[n].fb[ok?'ok':'no'];
  fb.className='qfb '+(ok?'ok':'no');
  fb.style.display='block';
  setTimeout(()=>{qIdx++;renderQ();},2000);
}
function showQRes(){
  const m=[
    {e:'📚',t:'¡A repasar!',p:'Explorá los temas y volvé.'},
    {e:'👍',t:'¡Buen intento!',p:`${qScore}/3. ¡Repasá y volvé!`},
    {e:'⭐',t:'¡Muy bien!',p:'¡Casi perfecto!'},
    {e:'🏆',t:'¡Geólogo experto!',p:'¡Perfecto! Roki está muy orgulloso.'}
  ][qScore];
  document.getElementById('qwrap').innerHTML=`
    <div style="text-align:center;padding:14px 0;">
      <div style="font-size:48px;margin-bottom:8px">${m.e}</div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;color:#FDF8EE;margin-bottom:6px">${m.t}</div>
      <p style="font-size:13px;color:#9B8A6E;line-height:1.6;margin-bottom:18px">${m.p}</p>
      <button onclick="initQuiz()" style="background:#C8841E;color:#fff;border:none;border-radius:11px;padding:12px 22px;font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;width:100%;">🔄 Intentar de nuevo</button>
    </div>`;
}

/* ════════════
   METAMORFISMO VIDEO — scrub only
════════════ */
function initMetaVideo(){
  const vid = document.getElementById('meta-video');
  if(!vid || vid._inited) return;
  vid._inited = true;
  // Pause at start — user controls with scrub bar
  vid.pause();
  vid.currentTime = 0;
  updateMetaBar();
}
function updateMetaBar(){
  const vid = document.getElementById('meta-video');
  const prog = document.getElementById('meta-prog');
  const thumb = document.getElementById('meta-thumb');
  if(!vid||!prog||!thumb||!vid.duration) return;
  const pct = (vid.currentTime/vid.duration)*100;
  prog.style.width = pct+'%';
  thumb.style.left = pct+'%';
}
let _scrubbing = false;
function startScrub(e){
  e.preventDefault();
  _scrubbing = true;
  doScrub(e);
  const move = ev => { if(_scrubbing) doScrub(ev); };
  const up   = () => { _scrubbing=false; document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.removeEventListener('touchmove',move); document.removeEventListener('touchend',up); };
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('touchend',up);
}
function doScrub(e){
  const vid = document.getElementById('meta-video');
  const bar = document.getElementById('meta-bar');
  if(!vid||!bar||!vid.duration) return;
  const r = bar.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0,Math.min(1,(clientX-r.left)/r.width));
  vid.currentTime = pct * vid.duration;
  updateMetaBar();
}

════════════ */
let camStream = null;

async function openAR(){
  document.getElementById('ar-screen').classList.add('open');
  const video = document.getElementById('cam-video');

  // Show/hide rotation hint based on orientation
  function updateHint(){
    const hint = document.getElementById('ar-rotate-hint');
    if(hint) hint.style.display = window.innerWidth > window.innerHeight ? 'none' : 'flex';
  }
  updateHint();
  window.addEventListener('resize', updateHint);

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    return;
  }
  try{
    camStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'}}, audio:false
    });
    video.srcObject = camStream;
    await video.play();
  }catch(e){
    console.warn('Camera:', e.name);
  }
}

function closeAR(){
  document.getElementById('ar-screen').classList.remove('open');
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  const video = document.getElementById('cam-video');
  if(video) video.srcObject = null;
}
