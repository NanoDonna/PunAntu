<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A0A04">
<title>Geoparque Pun Antü · Cerro El Triunfo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --red:#7A1A0A;--gold:#C8841E;--dark:#1A0A04;
  --panel:rgba(18,6,2,.9);--light:#FDF8EE;--stone:#9B8A6E;
}
html,body{height:100%;overflow:hidden;background:#000;}
body{width:100%;position:relative;font-family:'Nunito',sans-serif;}
model-viewer::part(default-ar-button){display:none;}

/* ══ SPLASH ══ */
#splash{
position:fixed;
top:0;left:0;right:0;bottom:0;
width:100%;          /* override body max-width */
max-width:none !important;
z-index:500;
background:radial-gradient(circle at 50% 35%,#5A2008 0%,#0E0402 100%);
display:flex;flex-direction:column;align-items:center;
justify-content:center;text-align:center;padding:28px;
overflow-y:auto;
}
#splash.hidden{display:none;}
.s-logo{width:90px;height:90px;object-fit:contain;margin-bottom:6px;}
.s-sub{font-size:9px;letter-spacing:4px;color:var(–gold);text-transform:uppercase;font-weight:800;margin-bottom:2px;}
.s-name{font-family:‘Playfair Display’,serif;font-size:44px;color:var(–light);line-height:1;}
.s-place{font-size:9px;letter-spacing:3px;color:var(–stone);text-transform:uppercase;margin-bottom:8px;}
#mv-splash{width:100%;height:52vw;min-height:240px;max-height:340px;background:transparent;display:block;margin:0 auto;}
.s-card{
background:rgba(200,132,30,.12);border:1px solid rgba(200,132,30,.28);
border-radius:12px;padding:9px 16px;margin:8px 0 14px;
color:var(–light);font-size:13px;line-height:1.5;
}
.s-card strong{color:var(–gold);}
.s-btn{
background:var(–gold);color:#fff;border:none;
border-radius:22px;padding:14px 36px;
font-family:‘Nunito’,sans-serif;font-size:15px;font-weight:800;
cursor:pointer;letter-spacing:.5px;
box-shadow:0 4px 24px rgba(200,132,30,.4);
transition:all .2s;width:100%;max-width:280px;
}
.s-btn:active{transform:scale(.97);background:#A86A10;}

/* ══ CAMERA BACKGROUND ══ */
#cam-bg{
position:fixed;inset:0;z-index:0;
width:100%;height:100%;object-fit:cover;
display:none;
}
/* Landscape fallback */
#landscape-bg{
position:fixed;inset:0;z-index:0;display:none;
background:linear-gradient(180deg,#5BA3D0 0%,#87CEEB 38%,#A8D878 38%,#6A9A38 52%,#5A8028 52%,#487020 62%,#7A6040 62%,#6A5030 75%,#5A4020 75%,#4A3010 100%);
overflow:hidden;
}
.cloud{position:absolute;background:rgba(255,255,255,.8);border-radius:40px;animation:drift linear infinite;}
@keyframes drift{from{transform:translateX(-150px)}to{transform:translateX(500px)}}
.rock{position:absolute;border-radius:40%;bottom:22%;}

/* ══ MODEL VIEWER ══ */
#mv-ar{
position:fixed;z-index:10;
left:0;right:0;
width:100%;
top:80px;bottom:116px;
–poster-color:transparent;
background:transparent;
display:none;
filter:drop-shadow(0 16px 40px rgba(0,0,0,.55));
}

/* ══ TOP HUD ══ */
#hud{
position:fixed;top:0;left:0;
width:100%;z-index:100;display:none;
padding:12px 16px 10px;
background:linear-gradient(to bottom,rgba(18,6,2,.9) 55%,transparent);
flex-direction:row;align-items:center;justify-content:space-between;
}
#hud.show{display:flex;}
.hud-logo{display:flex;align-items:center;gap:8px;}
.hud-logo img{width:36px;height:36px;object-fit:contain;}
.hud-txt .ht1{font-size:9px;letter-spacing:3px;color:var(–gold);text-transform:uppercase;font-weight:800;}
.hud-txt .ht2{font-family:‘Playfair Display’,serif;font-size:17px;color:var(–light);line-height:1;}
.hud-txt .ht3{font-size:8px;letter-spacing:2px;color:var(–stone);text-transform:uppercase;}
.hud-badge{
background:rgba(200,132,30,.2);border:1px solid rgba(200,132,30,.4);
border-radius:20px;padding:5px 11px;
font-size:10px;font-weight:800;color:var(–gold);letter-spacing:1px;
display:flex;align-items:center;gap:5px;
}
.hud-dot{width:6px;height:6px;border-radius:50%;background:var(–gold);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ══ SITE TAG ══ */
#site-tag{
position:fixed;top:68px;left:0;
width:100%;z-index:100;display:none;
padding:0 16px;align-items:center;gap:8px;
}
#site-tag.show{display:flex;}
.stag-num{background:var(–red);color:#fff;font-size:9px;font-weight:800;letter-spacing:1px;padding:3px 9px;border-radius:20px;text-transform:uppercase;}
.stag-name{font-family:‘Playfair Display’,serif;font-size:14px;color:rgba(255,255,255,.85);}

/* ══ BOTTOM BAR ══ */
#ar-bar{
position:fixed;bottom:0;left:0;
width:100%;z-index:100;display:none;
padding:10px 14px max(32px,env(safe-area-inset-bottom));
background:linear-gradient(to top,rgba(18,6,2,.97) 55%,rgba(18,6,2,.6) 80%,transparent);
}
#ar-bar.show{display:flex;flex-direction:column;gap:0;}
.menu-row{display:flex;align-items:center;gap:8px;}
.close-pill{
flex-shrink:0;background:rgba(255,255,255,.1);
border:1.5px solid rgba(255,255,255,.15);border-radius:50%;
width:44px;height:44px;color:var(–light);font-size:17px;
cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:all .18s;
}
.close-pill:active{background:rgba(255,255,255,.25);}
.pills-scroll{display:flex;gap:8px;overflow-x:auto;flex:1;scrollbar-width:none;}
.pills-scroll::-webkit-scrollbar{display:none;}
.pill{
flex-shrink:0;
background:rgba(22,8,2,.85);
backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border:1.5px solid rgba(255,255,255,.13);
border-radius:22px;padding:11px 17px;
color:var(–light);font-size:13px;font-weight:700;
cursor:pointer;display:flex;align-items:center;gap:7px;
transition:all .18s;white-space:nowrap;
}
.pill:active,.pill.active{background:rgba(200,132,30,.45);border-color:var(–gold);}
.pill .pi{font-size:18px;}

/* ══ INFO CARD ══ */
#info-card{
position:fixed;bottom:0;left:0;
width:100%;z-index:200;
background:var(–panel);
backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
border-radius:22px 22px 0 0;
padding:0 0 44px;
max-height:72vh;overflow-y:auto;
transform:translateY(100%);
transition:transform .38s cubic-bezier(.3,1,.3,1);
}
#info-card.open{transform:translateY(0);}
.ic-handle{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:12px auto 0;}
.ic-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;border-bottom:1px solid rgba(255,255,255,.07);}
.ic-head h3{font-family:‘Playfair Display’,serif;font-size:20px;color:var(–light);}
.ic-close{background:rgba(255,255,255,.1);border:none;color:var(–light);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ic-body{padding:14px 18px 4px;}

/* content cards */
.xcard{border-left:3px solid var(–gold);border-radius:0 10px 10px 0;background:rgba(255,255,255,.05);padding:11px 13px;margin-bottom:11px;color:rgba(255,255,255,.85);font-size:13px;line-height:1.7;}
.xcard h4{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(–gold);font-weight:800;margin-bottom:6px;}
.xhi{background:rgba(200,132,30,.12);border:1px solid rgba(200,132,30,.28);border-radius:12px;padding:14px;margin-bottom:12px;color:rgba(255,255,255,.88);font-size:13px;line-height:1.6;}
.xhi .xi{font-size:24px;margin-bottom:6px;}
.xhi strong{color:var(–gold);}
.bnum{font-family:‘Playfair Display’,serif;font-size:46px;color:var(–gold);line-height:1;}
.tli{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;}
.tld{width:9px;height:9px;border-radius:50%;background:var(–gold);flex-shrink:0;margin-top:5px;}
.tld.o{background:var(–stone);}
.tli strong{display:block;font-size:13px;color:var(–light);font-weight:700;}
.tli span{font-size:12px;color:var(–stone);}

/* decay slider */
#decay-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(–gold);cursor:pointer;box-shadow:0 2px 8px rgba(200,132,30,.5);}
#decay-slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(–gold);cursor:pointer;border:none;}

/* quiz */
.qq{background:rgba(122,26,10,.28);border:1px solid rgba(122,26,10,.45);border-radius:12px;padding:16px;margin-bottom:14px;font-family:‘Playfair Display’,serif;font-size:17px;color:var(–light);line-height:1.4;}
.qq .ql{font-family:‘Nunito’,sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(–gold);display:block;margin-bottom:6px;font-weight:700;}
.qo{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:11px 13px;margin-bottom:8px;cursor:pointer;font-size:13px;font-family:‘Nunito’,sans-serif;font-weight:600;width:100%;text-align:left;color:var(–light);transition:all .15s;}
.qo.ok{background:rgba(78,138,42,.22);border-color:#4E8A2A;color:#90D060;}
.qo.no{background:rgba(196,58,58,.18);border-color:#C43A3A;color:#F08080;}
.qfb{display:none;border-radius:9px;padding:11px 13px;margin-top:3px;font-size:12.5px;line-height:1.6;}
.qfb.ok{background:rgba(78,138,42,.12);color:#90D060;}
.qfb.no{background:rgba(196,58,58,.12);color:#F08080;}
</style>

</head>
<body>

<!-- ══ SPLASH ══ -->

<div id="splash">
  <div style="width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;">
  <img class="s-logo" src="logo.png" alt="Logo Geoparque Pun Antü">
  <div class="s-sub">Geoparque</div>
  <div class="s-name">Pun Antü</div>
  <div class="s-place">Balcarce · Argentina</div>

<model-viewer id="mv-splash"
src="PunAntuMascot.glb"
auto-rotate rotation-per-second="22deg"
camera-controls touch-action="pan-y"
shadow-intensity="1" exposure="1.2"
camera-orbit="0deg 78deg 2.6m">
</model-viewer>

  <div class="s-card">
    📍 <strong>Geositio 1 — Cerro El Triunfo</strong><br>
    La roca más antigua de Argentina · 2.200 Ma
  </div>
  <button class="s-btn" onclick="startAR()">📷 Iniciar experiencia</button>
  </div>
</div>

<!-- ══ CAMERA ══ -->

<video id="cam-bg" autoplay playsinline muted></video>

<!-- ══ LANDSCAPE FALLBACK ══ -->

<div id="landscape-bg">
  <div class="cloud" style="width:110px;height:32px;top:8%;animation-duration:20s;animation-delay:-3s;"></div>
  <div class="cloud" style="width:76px;height:22px;top:15%;animation-duration:28s;animation-delay:-13s;"></div>
  <div class="cloud" style="width:140px;height:38px;top:5%;animation-duration:24s;animation-delay:-7s;"></div>
  <div class="rock" style="width:58px;height:36px;left:8%;background:#5A4820;border-radius:40% 50% 45% 35%;"></div>
  <div class="rock" style="width:38px;height:24px;left:20%;bottom:24%;background:#6A5530;border-radius:35% 45% 50% 40%;"></div>
  <div class="rock" style="width:72px;height:44px;right:10%;background:#503C18;border-radius:45% 38% 42% 50%;"></div>
  <div class="rock" style="width:44px;height:28px;right:24%;bottom:23%;background:#5A4828;border-radius:38% 50% 45% 35%;"></div>
</div>

<!-- ══ 3D MASCOT ══ -->

<model-viewer id="mv-ar"
src="PunAntuMascot.glb"
auto-rotate rotation-per-second="15deg"
camera-controls touch-action="none"
shadow-intensity="1"
exposure="1.3"
camera-orbit="0deg 82deg 2.2m"
camera-target="0m 0.1m 0m"
field-of-view="28deg"
style="--poster-color:transparent;background:transparent;">
</model-viewer>

<!-- ══ TOP HUD ══ -->

<div id="hud">
  <div class="hud-logo">
    <img src="logo.png" alt="Logo">
    <div class="hud-txt">
      <div class="ht1">Geoparque</div>
      <div class="ht2">Pun Antü</div>
      <div class="ht3">Balcarce</div>
    </div>
  </div>
  <div class="hud-badge" id="hud-badge">
    <div class="hud-dot"></div>
    <span id="hud-label">EN VIVO</span>
  </div>
</div>

<!-- ══ SITE TAG ══ -->

<div id="site-tag">
  <div class="stag-num">Geositio 1</div>
  <div class="stag-name">Cerro El Triunfo</div>
</div>

<!-- ══ BOTTOM BAR ══ -->

<div id="ar-bar">
  <div class="menu-row">
    <button class="close-pill" onclick="stopAR()">✕</button>
    <div class="pills-scroll">
      <button class="pill" onclick="openInfo('rocas',this)"><span class="pi">🪨</span>Estas rocas</button>
      <button class="pill" onclick="openInfo('edad',this)"><span class="pi">⏳</span>Su edad</button>
      <button class="pill" onclick="openInfo('formacion',this)"><span class="pi">🌋</span>Formación</button>
      <button class="pill" onclick="openInfo('quiz',this)"><span class="pi">🎯</span>Quiz</button>
    </div>
  </div>
</div>

<!-- ══ INFO CARD ══ -->

<div id="info-card">
  <div class="ic-handle"></div>
  <div class="ic-head">
    <h3 id="ic-title"></h3>
    <button class="ic-close" onclick="closeInfo()">✕</button>
  </div>
  <div class="ic-body" id="ic-body"></div>
</div>

<script>
/* ── Start / Stop ── */
let stream=null;

async function startAR(){
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('mv-ar').style.display='block';
  document.getElementById('hud').classList.add('show');
  document.getElementById('site-tag').classList.add('show');
  document.getElementById('ar-bar').classList.add('show');

  const video=document.getElementById('cam-bg');
  const land=document.getElementById('landscape-bg');

  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    land.style.display='block';
    document.getElementById('hud-label').textContent='DEMO';
    return;
  }
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
      audio:false
    });
    video.srcObject=stream;
    await video.play();
    video.style.display='block';
  }catch(e){
    console.warn('Camera:',e.name);
    land.style.display='block';
    document.getElementById('hud-label').textContent='DEMO';
  }
}

function stopAR(){
  closeInfo();
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  document.getElementById('cam-bg').style.display='none';
  document.getElementById('cam-bg').srcObject=null;
  document.getElementById('landscape-bg').style.display='none';
  document.getElementById('mv-ar').style.display='none';
  document.getElementById('hud').classList.remove('show');
  document.getElementById('site-tag').classList.remove('show');
  document.getElementById('ar-bar').classList.remove('show');
  document.getElementById('splash').classList.remove('hidden');
}

/* ── Info panel ── */
const content={
  rocas:{
    title:'¿Qué son estas rocas?',
    html:`
      <div class="xcard"><h4>Tipo de roca</h4>La roca de este cerro se llama <strong style="color:#F0C070">Gneis</strong> ("neis"). Es una roca <strong>metamórfica</strong>: se forma cuando otras rocas sufren enormes presiones y temperaturas en el interior de la Tierra.</div>
      <div class="xcard"><h4>¿De dónde viene?</h4>Originalmente era magma que cristalizó a más de <strong>20 km de profundidad</strong>. Las deformaciones reorientaron sus cristales dándole el característico aspecto bandado.</div>
      <div class="xhi"><div class="xi">✨</div><strong>¿Sabías esto?</strong><br>Las bandas del Gneis se forman porque los minerales se separan bajo presión extrema. ¡Como si la roca se "tejiera" a kilómetros de profundidad!</div>`
  },
  edad:{
    title:'¿Qué edad tienen?',
    html:`
      <div class="xcard" style="text-align:center;padding:18px 13px;">
        <h4>Edad de las rocas</h4>
        <div class="bnum">2.200</div>
        <div style="font-size:13px;color:var(--stone);margin-top:4px;">millones de años</div>
        <div style="font-size:11px;color:var(--stone);margin-top:4px;">Período Paleoproterozoico</div>
      </div>
      <div class="xhi" style="text-align:center;">
        <div class="xi">🏆</div>
        <strong>La roca más antigua de Argentina</strong><br>
        Con 2.200 millones de años, el Gneis del Cerro El Triunfo es una de las rocas más antiguas del país. Tiene más del doble de la edad de los primeros trilobites.
      </div>
      <div class="xcard">
        <h4>¿Cómo sabemos la edad? · Decaimiento radiactivo</h4>
        <p style="font-size:12.5px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:14px;">
          El <strong style="color:#F0C070">uranio</strong> dentro de los minerales se transforma lentamente en <strong style="color:#B0B8C8">plomo</strong>. Cuanto más plomo y menos uranio, más vieja es la roca. Deslizá para verlo:
        </p>
        <!-- Bar -->
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
          <span style="font-size:16px;">⚛️</span>
          <div style="flex:1;height:22px;border-radius:11px;overflow:hidden;background:rgba(255,255,255,.08);position:relative;">
            <div id="decay-u" style="position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#F0C070,#C8841E);border-radius:11px;transition:width .08s;width:100%;"></div>
            <div id="decay-pb" style="position:absolute;right:0;top:0;height:100%;background:linear-gradient(90deg,#7A90A8,#B0B8C8);border-radius:11px;transition:width .08s;width:0%;"></div>
          </div>
          <span style="font-size:16px;">🪨</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:16px;">
          <span style="color:#C8841E;font-weight:700;">⚛️ Uranio: <span id="decay-u-pct">100</span>%</span>
          <span style="color:#B0B8C8;font-weight:700;">Plomo: <span id="decay-pb-pct">0</span>% 🪨</span>
        </div>
        <!-- Age result box -->
        <div style="background:rgba(200,132,30,.15);border:1px solid rgba(200,132,30,.3);border-radius:10px;padding:14px;text-align:center;margin-bottom:16px;">
          <div style="font-size:11px;color:var(--stone);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:4px;">Edad simulada</div>
          <div id="decay-age-val" style="font-family:'Playfair Display',serif;font-size:36px;color:var(--gold);line-height:1;">0</div>
          <div style="font-size:11px;color:var(--stone);margin-top:2px;">millones de años</div>
          <div id="decay-event" style="font-size:12px;color:rgba(255,255,255,.75);margin-top:8px;min-height:18px;font-weight:600;"></div>
        </div>
        <!-- Slider at bottom so thumb doesn't cover the result -->
        <input type="range" id="decay-slider" min="0" max="4600" value="0" step="10"
          style="width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:rgba(255,255,255,.15);outline:none;cursor:pointer;margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--stone);">
          <span>0 Ma (hoy)</span><span>2.300 Ma</span><span>4.600 Ma</span>
        </div>
      </div>`
  },
  formacion:{
    title:'¿Cómo se formaron?',
    html:`
      <div class="xcard"><h4>Paso 1 · El Cratón antiguo</h4>Hace 2.200 Ma existía el <strong>Cratón del Río de la Plata</strong>: masa continental rígida que hoy forma el basamento bajo Buenos Aires, Uruguay y Brasil.</div>
      <div class="xcard"><h4>Paso 2 · Colisión de bloques</h4>Bloques menores colisionaron formando el <strong>Complejo Buenos Aires</strong> — la porción más austral del Cratón a la que pertenece este cerro.</div>
      <div class="xcard"><h4>Paso 3 · Subducción y magma</h4>Cortezas oceánicas se hundieron bajo los continentes, fundiendo rocas del manto y creando <strong>magma</strong> a más de 20 km de profundidad.</div>
      <div class="xcard"><h4>Paso 4 · Metamorfismo</h4>El magma cristalizó y las presiones de la orogénesis <strong>deformaron y metamorfizaron</strong> las rocas, formando los Gneis que ves hoy.</div>
      <div class="xhi"><div class="xi">🏛️</div><strong>¡Dato increíble!</strong><br>Estas rocas se usaron en edificios históricos de <strong>la Plaza de Mayo</strong> en Buenos Aires.</div>`
  },
  quiz:{title:'¡Poné a prueba tu saber!',html:`<div id="qwrap"></div>`}
};

let activeBtn=null;
function openInfo(id,btn){
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeBtn=btn;
  document.getElementById('ic-title').textContent=content[id].title;
  document.getElementById('ic-body').innerHTML=content[id].html;
  if(id==='quiz') initQuiz();
  if(id==='edad') initDecay();
  document.getElementById('info-card').classList.add('open');
}
function closeInfo(){
  document.getElementById('info-card').classList.remove('open');
  if(activeBtn){activeBtn.classList.remove('active');activeBtn=null;}
}

/* ── Decay widget ── */
function initDecay(){
  const slider=document.getElementById('decay-slider');
  if(!slider) return;
  const events=[
    {ma:0,    txt:'⬅️ Deslizá para retroceder en el tiempo'},
    {ma:66,   txt:'🦕 Los dinosaurios se extinguieron'},
    {ma:252,  txt:'💀 La mayor extinción masiva de la historia'},
    {ma:541,  txt:'🐚 Aparecen los primeros animales con esqueleto'},
    {ma:1000, txt:'🌍 Los continentes forman un supercontinente'},
    {ma:2200, txt:'🪨 ¡Aquí se formaron las rocas del Cerro El Triunfo!'},
    {ma:3800, txt:'🦠 Aparece la primera vida en la Tierra'},
    {ma:4600, txt:'💫 La Tierra recién se está formando'},
  ];
  function update(){
    const ma=parseInt(slider.value);
    const uFrac=Math.pow(0.5,ma/4468);
    const uP=Math.round(uFrac*100);
    const pbP=100-uP;
    document.getElementById('decay-u').style.width=uP+'%';
    document.getElementById('decay-pb').style.width=pbP+'%';
    document.getElementById('decay-u-pct').textContent=uP;
    document.getElementById('decay-pb-pct').textContent=pbP;
    document.getElementById('decay-age-val').textContent=ma.toLocaleString('es-AR');
    let closest=events[0],minDist=Infinity;
    events.forEach(e=>{const d=Math.abs(e.ma-ma);if(d<minDist){minDist=d;closest=e;}});
    document.getElementById('decay-event').textContent=minDist<150?closest.txt:'';
  }
  slider.addEventListener('input',update);
  update();
}

/* ── Quiz ── */
const QS=[
  {q:'¿A qué tipo de roca pertenece el Gneis?',opts:['🔥 Roca ígnea','💎 Roca metamórfica','🏖️ Roca sedimentaria'],ok:1,
   fb:{ok:'¡Exacto! El Gneis es metamórfico. ✅',no:'No. El Gneis es <strong>metamórfico</strong>. ❌'}},
  {q:'¿A cuánta profundidad se formaron?',opts:['📏 2 km','📏 10 km','📏 +20 km'],ok:2,
   fb:{ok:'¡Correcto! Más de 20 km. ✅',no:'No. Se formaron a <strong>más de 20 km</strong>. ❌'}},
  {q:'¿Cuántos millones de años tienen?',opts:['🕰️ 200 Ma','🕰️ 600 Ma','🕰️ 2.200 Ma'],ok:2,
   fb:{ok:'¡Así es! 2.200 millones de años. ✅',no:'No. Tienen <strong>2.200 millones de años</strong>. ❌'}}
];
let qScore=0,qIdx=0,qAns=[false,false,false];
function initQuiz(){qScore=0;qIdx=0;qAns=[false,false,false];renderQ();}
function renderQ(){
  const w=document.getElementById('qwrap');if(!w)return;
  if(qIdx>=QS.length){showQRes();return;}
  const q=QS[qIdx];
  w.innerHTML=`<div class="qq"><span class="ql">Pregunta ${qIdx+1} de ${QS.length}</span>${q.q}</div>
    ${q.opts.map((o,i)=>`<button class="qo" onclick="ansQ(this,${i===q.ok},${qIdx})">${o}</button>`).join('')}
    <div id="qfb" class="qfb"></div>`;
}
function ansQ(el,ok,n){
  if(qAns[n])return;qAns[n]=true;if(ok)qScore++;
  document.querySelectorAll('.qo').forEach(b=>b.disabled=true);
  el.classList.add(ok?'ok':'no');
  const fb=document.getElementById('qfb');
  fb.innerHTML=(ok?'🎉 ':'🤔 ')+QS[n].fb[ok?'ok':'no'];
  fb.className='qfb '+(ok?'ok':'no');
  fb.style.display='block';
  setTimeout(()=>{qIdx++;renderQ();},2000);
}
function showQRes(){
  const m=[
    {e:'📚',t:'¡A repasar!',p:'Explorá los temas y volvé a intentarlo.'},
    {e:'👍',t:'¡Buen intento!',p:`${qScore}/3. ¡Repasá y volvé!`},
    {e:'⭐',t:'¡Muy bien!',p:'¡Casi perfecto!'},
    {e:'🏆',t:'¡Geólogo experto!',p:'¡Perfecto! Roki está muy orgulloso.'}
  ][qScore];
  document.getElementById('qwrap').innerHTML=`
    <div style="text-align:center;padding:14px 0;">
      <div style="font-size:48px;margin-bottom:8px">${m.e}</div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--light);margin-bottom:6px">${m.t}</div>
      <p style="font-size:13px;color:var(--stone);line-height:1.6;margin-bottom:18px">${m.p}</p>
      <button onclick="initQuiz()" style="background:var(--gold);color:#fff;border:none;border-radius:11px;padding:12px 22px;font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;width:100%;">🔄 Intentar de nuevo</button>
    </div>`;
}

/* ── Remove black background from logo images ── */
function removeBlackBg(img){
  if(!img.complete||img.naturalWidth===0){img.onload=()=>removeBlackBg(img);return;}
  try{
    const c=document.createElement('canvas');
    c.width=img.naturalWidth;c.height=img.naturalHeight;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height);
    for(let i=0;i<d.data.length;i+=4){
      const r=d.data[i],g=d.data[i+1],b=d.data[i+2];
      // Remove near-black pixels
      if(r<50&&g<50&&b<50) d.data[i+3]=0;
    }
    ctx.putImageData(d,0,0);
    img.src=c.toDataURL('image/png');
  }catch(e){console.warn('Logo bg removal failed:',e);}
}
// Apply to all logo images once DOM is ready
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('img[src="logo.png"]').forEach(removeBlackBg);
});
// Also handle dynamically shown HUD logo
const _origStart = window.startAR;

// Re-apply to HUD logo when it becomes visible
const origStartAR = startAR;
window.startAR = async function(){
  await origStartAR();
  document.querySelectorAll('img[src="logo.png"]').forEach(removeBlackBg);
};
